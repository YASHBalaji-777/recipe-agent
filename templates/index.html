<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Prep Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <header>
            <div class="logo">🍳 PrepAgent</div>
            <h1>What's in your fridge?</h1>
            <p>Enter your ingredients, and we will find or generate the perfect recipe.</p>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="ingredients-input" placeholder="e.g. egg, butter, tomato" />
                <button id="search-btn">Find Recipes</button>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Searching recipes & consult AI Chef...</p>
            </div>

            <div id="results" class="results-container hidden">
                <!-- Dynamic cards insertion via JS -->
            </div>
        </main>
    </div>

    <script>
        document.getElementById('search-btn').addEventListener('click', async () => {
            const input = document.getElementById('ingredients-input').value;
            const resultsDiv = document.getElementById('results');
            const loading = document.getElementById('loading');
            
            if (!input.trim()) {
                alert('Please enter ingredients!');
                return;
            }

            loading.classList.remove('hidden');
            resultsDiv.classList.add('hidden');
            resultsDiv.innerHTML = '';

            try {
                const response = await fetch('/get_recipe', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ingredients: input })
                });

                const data = await response.json();
                loading.classList.add('hidden');

                if (data.error) {
                    alert(data.error);
                    return;
                }

                resultsDiv.classList.remove('hidden');
                
                // Set source badge (AI or database)
                const sourceBadge = data.source === 'ai' 
                    ? '<span class="badge ai-badge">✨ Generated by AI Chef (Saved to DB)</span>' 
                    : '<span class="badge db-badge">📂 Found in Local Database</span>';

                resultsDiv.innerHTML = `<div class="source-info">${sourceBadge}</div>`;

                data.recipes.forEach(item => {
                    const r = item.recipe;
                    
                    // Ingredients List HTML
                    const ingredientsHTML = r.ingredients.map(ing => `<li>${ing}</li>`).join('');
                    
                    // Instructions HTML
                    const instructionsHTML = r.instructions.map(step => `<li>${step}</li>`).join('');
                    
                    // Substitutions HTML
                    let subsHTML = '';
                    if (r.substitutions && Object.keys(r.substitutions).length > 0) {
                        subsHTML = '<div class="subs-section"><h3>💡 Substitutions:</h3><ul>';
                        for (const [key, val] of Object.entries(r.substitutions)) {
                            subsHTML += `<li><strong>${key}:</strong> try using ${val}</li>`;
                        }
                        subsHTML += '</ul></div>';
                    }

                    const card = document.createElement('div');
                    card.className = 'recipe-card';
                    card.innerHTML = `
                        <h2>${r.name} <span class="match-score">${item.match_percentage}% Match</span></h2>
                        <div class="recipe-content">
                            <div class="col">
                                <h3>Ingredients:</h3>
                                <ul>${ingredientsHTML}</ul>
                            </div>
                            <div class="col">
                                <h3>Instructions:</h3>
                                <ol>${instructionsHTML}</ol>
                            </div>
                        </div>
                        ${subsHTML}
                    `;
                    resultsDiv.appendChild(card);
                });

            } catch (err) {
                loading.classList.add('hidden');
                alert('Something went wrong. Please check connection.');
            }
        });
    </script>
</body>
</html>
